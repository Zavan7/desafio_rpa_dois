version: "3.9"

services:
  automacao:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: automacao-python
    volumes:
      - ../logs:/app/logs
      - ../downloads:/app/downloads
    env_file:
      - ../.env
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: mongo-automacao
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: